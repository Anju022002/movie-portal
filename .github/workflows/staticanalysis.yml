name: Static Analysis Pylint

on:
  push:
    branches: ["main"]

jobs:
  pylint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint

      - run: |
          pylint $(git ls-files '*.py')
